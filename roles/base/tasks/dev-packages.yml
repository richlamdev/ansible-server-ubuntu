---
- name: Ensure development packages and libraries are installed
  set_fact:
    dev_packages:
    - pipx
    - shellcheck
    - shfmt
    - universal-ctags

- name: register dev tools pacakages
  apt:
    state: latest
    name: "{{ dev_packages }}"
  register: _apt_dev_result

- name: display dev tools
  debug:
    msg: "{{ dev_packages }}"

- name: dev tools | show what changed
  debug:
    msg "{{ _apt_dev_result.stdout_lines }}"
  when: _apt_dev_result.changed

- name: install development tools
  community.general.pipx:
    state: latest
    name: "{{ item }}"
    install_deps: true
  loop:
    - bandit
    - black
    - flake8
    - glances
    - pre-commit
    - ruff
    - yamlfmt
    - yamllint
  become: false

- name: Check if pipx path is present
  shell: test -d ~/.local/bin && echo "Pipx ensurepath executed" || echo "Pipx ensurepath not executed"
  register: pipx_ensurepath_output
  changed_when: false
  ignore_errors: true
  become: false

- name: Execute pipx ensurepath, if required
  command: pipx ensurepath
  when: pipx_ensurepath_output.rc != 0
  become: false
